<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Script 데이터 연동 페이지</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f7fb;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #357ae8;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 6px;
            border-left: 5px solid #4285f4;
            min-width: 200px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📊 Apps Script 연동 결과</h2>
        <p>아래 버튼을 누르면 구글 스크립트에서 데이터를 가져옵니다.</p>
        <button id="load-btn">데이터 불러오기</button>
        <div id="result">아직 데이터를 불러오지 않았습니다.</div>
    </div>

    <script>
        // ⚠️ 본인의 Apps Script 웹 앱 URL을 반드시 여기에 붙여넣으세요!
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4kwfPLGLctGagrkABpPv_S8Z9CVgW2AfUR86SqVccZlLMXv1s5HAx_ZH0uxuADjRUyQ/exec";

        document.getElementById('load-btn').addEventListener('click', () => {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "로딩 중...";

            // 비동기로 Apps Script URL에 요청 보냄 (Fetch API)
            fetch(APPS_SCRIPT_URL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('네트워크 응답에 문제가 있습니다.');
                    }
                    return response.text(); // 텍스트 형태 결과물 파싱
                })
                .then(data => {
                    // 결과물을 화면에 표시
                    resultDiv.innerText = data;
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultDiv.innerText = "데이터를 가져오는 중 오류가 발생했습니다. (URL이나 권한 설정을 확인하세요)";
                });
        });
    </script>

</body>
</html>
